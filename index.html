<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playing Drum</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
    </header>
        <main class="main-container">
        
            <div data-key="A" class="container-btn">
                <kbd>A</kbd>
                <p>CLAP</p>
                <audio data-key="A" src="sounds/clap.wav"></audio>
            </div>

            <div data-key="S" class="container-btn">
                <kbd>S</kbd>
                <p>HIHAT</p>
                <audio data-key="S" src="sounds/hihat.wav"></audio>
            </div>
            
            <div data-key="D" class="container-btn">
                <kbd>D</kbd>
                <p>KICK</p>
                <audio data-key="D" src="sounds/kick.wav"></audio>
            </div>
            
            <div data-key="F" class="container-btn">
                <kbd>F</kbd>
                <p>OPENHAT</p>
                <audio data-key="F" src="sounds/openhat.wav"></audio>
            </div>
            
            <div data-key="G" class="container-btn">
                <kbd>G</kbd>
                <p>BOOM</p>
                <audio  data-key="G" src="sounds/boom.aac"></audio>
            </div>
            
            <div data-key="H" class="container-btn">
                <kbd>H</kbd>
                <p>RIDE</p>
                <audio data-key="H" src="sounds/ride.mp3"></audio>
            </div>
            
            <div data-key="J" class="container-btn">
                <kbd>J</kbd>
                <p>SNARE</p>
                <audio data-key="J" src="sounds/snare.wav"></audio>
            </div>
            
            <div data-key="K" class="container-btn">
                <kbd>K</kbd>
                <p>NORM</p>
                <audio data-key="K" src="sounds/tom.wav"></audio>
            </div>
            
            <div data-key="L" class="container-btn">
                <kbd>L</kbd>
                <p>TINK</p>
                <audio data-key="L" src="sounds/crash.wav"></audio>
            </div>
        
        </main>
    <footer>
        
    </footer>
    
    <script src="script.js"></script>
</body>
</html>
